<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<link rel="manifest" href="manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Axarenergy"/>
<meta name="theme-color" content="#1a9bdc"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Axarenergy CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f7fa;color:#1a2332;font-size:14px}
:root{--ax:#1a9bdc;--gr:#16a34a;--am:#d97706;--re:#dc2626;--bd:#e2e8f0;--sf:#fff}

/* NAV */
nav{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 12px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:10}
nav img{height:28px;margin-right:12px;padding:12px 0}
nav button{padding:14px 14px;border:none;background:none;font-size:13px;font-weight:500;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
nav button.on{color:var(--ax);border-bottom-color:var(--ax)}
.sync{margin-left:auto;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600}
.sync.ok{background:#dcfce7;color:var(--gr)}
.sync.off{background:#fef3c7;color:var(--am)}
.sync.err{background:#fee2e2;color:var(--re)}

/* LAYOUT */
.page{display:none;padding:16px;max-width:900px;margin:0 auto}
.page.on{display:block}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:12px 14px}
.stat .v{font-size:22px;font-weight:700}
.stat .l{font-size:11px;color:#6b7280;margin-top:3px;text-transform:uppercase;letter-spacing:.4px}

/* TOOLBAR */
.bar{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:9px 12px;margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.bar input,.bar select{height:30px;padding:0 10px;border:1px solid var(--bd);border-radius:6px;font-size:13px;font-family:inherit;outline:none;color:#1a2332}
.bar input{flex:1;min-width:140px}
.bar-end{margin-left:auto;font-size:12px;color:#9ca3af}

/* CARDS */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.card:hover{border-color:#c8d5e4}
.card-head{display:flex;align-items:center;gap:10px;cursor:pointer}
.card-body{border-top:1px solid var(--bd);padding:10px 0 2px;margin-top:10px;display:none}
.card.open .card-body{display:block}
.vbar{width:3px;height:32px;border-radius:2px;flex-shrink:0}
.vtime{min-width:40px;text-align:center;font-size:13px;font-weight:700}
.vinfo{flex:1;min-width:0}
.vname{font-size:14px;font-weight:600}
.vsub{font-size:12px;color:#6b7280;margin-top:1px}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.b-gr{background:#dcfce7;color:#166534}
.b-ax{background:#dbeafe;color:#1e40af}
.b-am{background:#fef3c7;color:#92400e}
.b-re{background:#fee2e2;color:#991b1b}
.b-gy{background:#f3f4f6;color:#6b7280}
.b-pu{background:#ede9fe;color:#5b21b6}

/* CLIENTS */
.cl{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;gap:10px;align-items:flex-start}
.cl:hover{border-color:#c8d5e4}
.av{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.cl-info{flex:1;min-width:0}
.cl-nm{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cl-sub{font-size:12px;color:#6b7280;margin-top:2px}
.cl-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}

/* PIPELINE */
.kan{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
.kcol{min-width:175px;width:175px;flex-shrink:0;background:#f9fafb;border:1px solid var(--bd);border-radius:8px;padding:10px}
.kcol-h{font-size:11px;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between}
.opp{background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:9px 11px;margin-bottom:6px;cursor:pointer}
.opp:hover{border-color:var(--ax)}
.opp-nm{font-size:12px;font-weight:600}
.opp-val{font-size:13px;font-weight:700;color:var(--ax);margin-top:4px}
.prob{height:3px;background:#e5e7eb;border-radius:2px;margin-top:5px;overflow:hidden}
.prob-fill{height:100%;border-radius:2px}

/* PARTE */
.p2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pcard{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:14px}
.pcard-t{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;margin-bottom:10px}
.pf label{display:block;font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.pf textarea{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:6px;font-family:inherit;font-size:13px;resize:vertical;min-height:60px;outline:none}
.pf textarea:focus{border-color:var(--ax)}
.pf{margin-bottom:10px}
.mood{display:flex;gap:6px;margin-top:4px}
.mood button{flex:1;padding:6px;border:1.5px solid var(--bd);border-radius:6px;font-size:18px;cursor:pointer;background:var(--sf)}
.mood button.on{border-color:var(--ax);background:#eff6ff}
.tarea{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid var(--bd);border-radius:6px;margin-bottom:5px}
.tarea.done span{text-decoration:line-through;color:#9ca3af}
.tarea span{flex:1;font-size:13px}
.tarea button{border:none;background:none;cursor:pointer;color:#9ca3af;font-size:16px}
.tadd{display:flex;gap:6px;margin-top:6px}
.tadd input{flex:1;padding:7px 10px;border:1px solid var(--bd);border-radius:6px;font-family:inherit;font-size:13px;outline:none}

/* ALERTAS */
.al{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.al.done{opacity:.5}
.aldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.al-info{flex:1}
.al-msg{font-size:13px;font-weight:500}
.al-sub{font-size:11px;color:#9ca3af;margin-top:2px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 12px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--bd);background:var(--sf);color:#1a2332;font-family:inherit;white-space:nowrap}
.btn:hover{background:#f9fafb}
.btn-ax{background:var(--ax);color:#fff;border-color:var(--ax)}
.btn-ax:hover{background:#1280b5}
.btn-re{background:#fee2e2;color:var(--re);border-color:#fca5a5}
.add{height:30px;padding:0 13px;background:var(--ax);color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.add:hover{background:#1280b5}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--sf);border-radius:10px;width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mh{padding:13px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.mh h3{font-size:15px;font-weight:700}
.mx{width:26px;height:26px;border:1px solid var(--bd);border-radius:5px;background:#f9fafb;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.mb{padding:14px 16px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:10px}
.mf{padding:11px 16px;border-top:1px solid var(--bd);display:flex;gap:7px;justify-content:flex-end;background:#f9fafb}
.fi{display:flex;flex-direction:column;gap:4px}
.fi label{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px}
.fi input,.fi select,.fi textarea{border:1px solid var(--bd);border-radius:6px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;color:#1a2332}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--ax)}
.fi textarea{resize:vertical;min-height:60px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fsec{font-size:10px;font-weight:700;color:var(--ax);text-transform:uppercase;letter-spacing:.5px;padding:3px 0;border-bottom:1px solid var(--bd)}

/* TOAST */
.toast{position:fixed;bottom:16px;right:16px;background:#1a2332;color:#fff;padding:9px 14px;border-radius:7px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;border-left:3px solid var(--ax);z-index:200}
.toast.show{opacity:1}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:#9ca3af}
.empty div{font-size:36px;margin-bottom:10px}

/* RESPONSIVE */
@media(max-width:600px){
  .stats{grid-template-columns:1fr 1fr}
  .p2{grid-template-columns:1fr}
  .fr{grid-template-columns:1fr}
  nav button span{display:none}
}
</style>
</head>

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

function saveLocal(){
  try{
    localStorage.setItem(NS,JSON.stringify({V,C,O,AL,PA,ETAPAS,ECOL,ts:Date.now()}));
    return true;
  }catch(e){
    toast('❌ Error guardando: '+e.message);
    return false;
  }
}

async function sb(method,table,body,qs=''){
  const r=await fetch(SB_URL+'/rest/v1/'+table+qs,{
    method,
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json',
      'Prefer':method==='POST'?'resolution=merge-duplicates,return=minimal':'return=minimal'},
    body:body?JSON.stringify(body):undefined
  });
  if(!r.ok)throw new Error(await r.text());
  return method==='GET'?r.json():true;
}

function setSB(status){
  const el=document.getElementById('sync');
  if(!el)return;
  const m={ok:['⬤ Sincronizado','ok'],off:['⬤ Offline','off'],saving:['⬤ Guardando...','off'],err:['⬤ Error','err']};
  const [txt,cls]=m[status]||m.off;
  el.textContent=txt; el.className='sync '+cls;
}

async function save(){
  // 1. Siempre guarda en local primero
  if(!saveLocal()){return;}
  
  // 2. Luego intenta nube
  setSB('saving');
  try{
    const ops=[
      V.length?sb('POST','visitas',V.map(v=>({id:v.id,cliente:v.cliente||'',contacto:v.contacto||'',telefono:v.telefono||'',fecha:v.fecha||'',hora:v.hora||'',tipo:v.tipo||'',estado:v.estado||'',notas:v.notas||''})),'?on_conflict=id'):null,
      C.length?sb('POST','clientes',C.map(c=>({id:c.id,empresa:c.empresa||'',nif:c.nif||'',contacto:c.contacto||'',cargo:c.cargo||'',telefono:c.telefono||'',email:c.email||'',sector:c.sector||'',ciudad:c.ciudad||'',estado:c.estado||'nunca',origen:c.origen||'',cups:c.cups||'',direccion:c.direccion||'',compania:c.compania||'',energia:c.energia||'',tarifa:c.tarifa||'',kw:c.kw||0,kwh:c.kwh||0,importe:c.importe||0,notas:c.notas||''})),'?on_conflict=id'):null,
      O.length?sb('POST','oportunidades',O.map(o=>({id:o.id,cliente:o.cliente||'',contacto:o.contacto||'',valor:o.valor||0,prob:o.prob||50,etapa:o.etapa||'',tipo:o.tipo||'',fecha:o.fecha||'',notas:o.notas||''})),'?on_conflict=id'):null,
      AL.length?sb('POST','alertas',AL.map(a=>({id:a.id,msg:a.msg||'',tipo:a.tipo||'',fecha:a.fecha||'',hora:a.hora||'',cliente:a.cliente||'',activa:a.activa!==false})),'?on_conflict=id'):null,
    ];
    const partes=Object.entries(PA).map(([fecha,p])=>({fecha,obj:p.obj||'',log:p.log||'',dif:p.dif||'',prox:p.prox||'',mood:p.mood||'',tareas:p.tareas||[]}));
    if(partes.length)ops.push(sb('POST','partes',partes,'?on_conflict=fecha'));
    await Promise.all(ops.filter(Boolean));
    setSB('ok');
  }catch(e){
    setSB('err');
    console.warn('Supabase save:',e.message);
  }
}

async function load(){
  // 1. Carga local inmediata
  setSB('off');
  try{
    const raw=localStorage.getItem(NS);
    if(raw){
      const d=JSON.parse(raw);
      V=d.V||[];C=d.C||[];O=d.O||[];AL=d.AL||[];PA=d.PA||{};
      if(d.ETAPAS)Object.assign(ETAPAS,d.ETAPAS);
      if(d.ECOL)Object.assign(ECOL,d.ECOL);
    }else{seed();}
  }catch(e){seed();}
  render();

  // 2. Intenta nube
  setSB('saving');
  try{
    const [cv,cc,co,ca,cp]=await Promise.all([
      sb('GET','visitas',null,'?select=*'),
      sb('GET','clientes',null,'?select=*&order=empresa.asc'),
      sb('GET','oportunidades',null,'?select=*'),
      sb('GET','alertas',null,'?select=*'),
      sb('GET','partes',null,'?select=*'),
    ]);
    if(cv)V=cv; if(cc)C=cc; if(co)O=co; if(ca)AL=ca;
    if(cp){PA={};cp.forEach(p=>{PA[p.fecha]={obj:p.obj||'',log:p.log||'',dif:p.dif||'',prox:p.prox||'',mood:p.mood||'',tareas:p.tareas||[]};});}
    saveLocal();
    setSB('ok');
    render();
  }catch(e){
    setSB('off');
    console.warn('Supabase load:',e.message);
  }
}

// ── NAV ──
function setTab(t,el){
  tab=t;
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));
  if(el)el.classList.add('on');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById(t).classList.add('on');
  render();
}

// ── RENDER ──
function render(){
  if(tab==='agenda')   rAgenda();
  if(tab==='pipeline') rPipeline();
  if(tab==='clientes') rClientes();
  if(tab==='parte')    rParte();
  if(tab==='alertas')  rAlertas();
}

// ── AGENDA ──

  const tV=V.filter(v=>v.fecha===TODAY);

    return true;

  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">

    <div class="stat"><div class="v" style="color:var(--am)">${tV.filter(v=>v.estado==='Pendiente').length}</div><div class="l">Pendientes</div></div>
    <div class="stat"><div class="v" style="color:var(--ax)">${V.filter(v=>v.tipo==='Nuevo').length}</div><div class="l">Nuevos</div></div>
  </div>
  <div class="bar">
    <input type="date" value="${fDate}" onchange="fDate=this.value;render()" style="width:140px;flex:none"/>
    <input type="search" placeholder="Buscar..." value="${fQ}" oninput="fQ=this.value;render()"/>
    <select onchange="fEst=this.value;render()" style="width:120px">
      ${['Todos','Pendiente','En curso','Completada','Cancelada'].map(s=>`<option ${fEst===s?'selected':''}>${s}</option>`).join('')}

    <select onchange="fTip=this.value;render()" style="width:110px">

      <div class="card-head" onclick="xId='${v.id}'==='${xId}'?xId=null:xId='${v.id}';render()">

        <div class="vtime">${v.hora}</div>
        <div class="vinfo">
          <div class="vname">${v.cliente} <span style="font-size:10px;color:${TC[v.tipo]};background:${TC[v.tipo]}18;padding:1px 7px;border-radius:20px;font-weight:600">${v.tipo}</span></div>
          <div class="vsub">👤 ${v.contacto||'—'}${v.telefono?' · 📞 '+v.telefono:''}</div>
        </div>
        <span class="badge ${ECLS[v.estado]||'b-gy'}">${v.estado}</span>
      </div>
      ${isX?`<div class="card-body">
        ${v.notas?`<div style="background:#eff6ff;border-radius:6px;padding:8px 10px;font-size:13px;color:#1e40af;margin-bottom:10px">📝 ${v.notas}</div>`:''}
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          <span style="font-size:12px;color:#9ca3af">Estado:</span>

function setEst(id,e){V=V.map(v=>v.id===id?{...v,estado:e}:v);save();toast('Estado → '+e);render();}
function delV(id){if(!confirm('¿Eliminar?'))return;V=V.filter(v=>v.id!==id);save();xId=null;toast('Eliminada');render();}

  const cer=O.filter(o=>o.etapa==='Cerrado').reduce((s,o)=>s+(o.valor||0),0);
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-size:16px;font-weight:700">Pipeline comercial</div>

    <div class="stat"><div class="v" style="font-size:17px">${fmtE(tot)}</div><div class="l">Pipeline</div></div>
    <div class="stat"><div class="v" style="color:var(--gr);font-size:17px">${fmtE(cer)}</div><div class="l">Cerrado</div></div>
    <div class="stat"><div class="v" style="color:var(--am)">${O.filter(o=>['Propuesta','Negociación'].includes(o.etapa)).length}</div><div class="l">En proceso</div></div>

    h+=`<div class="kcol">
      <div class="kcol-h"><span style="color:${ECOL[et]}">${et}</span><span style="color:#9ca3af">${ops.length}</span></div>`;
    if(!ops.length)h+=`<div style="font-size:11px;color:#9ca3af;text-align:center;padding:12px 0;font-style:italic">Vacío</div>`;
    ops.forEach(o=>{
      h+=`<div class="opp" onclick="openO('${o.id}')">
        <div class="opp-nm">${o.cliente}</div>
        <div style="font-size:10px;color:#9ca3af;margin-top:1px">${o.tipo||''}</div>
        <div class="opp-val">${fmtE(o.valor||0)}</div>
        <div class="prob"><div class="prob-fill" style="width:${o.prob||50}%;background:${o.etapa==='Cerrado'?'var(--gr)':'var(--ax)'}"></div></div>

    });

  });
  h+=`</div>`;

// ── PARTE ──
function getP(f){if(!PA[f])PA[f]={obj:'',log:'',dif:'',prox:'',mood:'',tareas:[]};return PA[f];}
function rParte(){
  const p=getP(parteDate);
  const dV=V.filter(v=>v.fecha===parteDate).sort((a,b)=>a.hora.localeCompare(b.hora));
  const tl=dV.length?dV.map(v=>{
    const cols={Completada:'var(--gr)',Pendiente:'var(--am)','En curso':'var(--ax)',Cancelada:'var(--re)'};
    return `<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f3f4f6">
      <div style="width:18px;height:18px;border-radius:50%;border:2px solid ${cols[v.estado]||'#9ca3af'};display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;margin-top:1px">${v.estado==='Completada'?'✓':'○'}</div>
      <div><div style="font-size:13px;font-weight:500">${v.hora} — ${v.cliente}</div><div style="font-size:11px;color:#9ca3af">${v.contacto||''}</div></div>
    </div>`;
  }).join(''):`<div style="font-size:12px;color:#9ca3af;font-style:italic;padding:6px 0">Sin visitas para esta fecha</div>`;
  const tareas=(p.tareas||[]).map((t,i)=>`<div class="tarea ${t.done?'done':''}">
    <input type="checkbox" ${t.done?'checked':''} onchange="toggleT(${i})" style="width:14px;height:14px;accent-color:var(--ax);cursor:pointer"/>
    <span>${t.text}</span>
    <button onclick="delT(${i})">×</button>
  </div>`).join('');
  document.getElementById('parte').innerHTML=`
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
    <div style="font-size:16px;font-weight:700">Parte diario</div>
    <input type="date" value="${parteDate}" onchange="parteDate=this.value;rParte()" style="height:28px;padding:0 9px;border:1px solid var(--bd);border-radius:6px;font-size:13px;outline:none"/>
    <button class="btn" onclick="pdfParte()">🖨️ PDF</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="v">${dV.length}</div><div class="l">Visitas</div></div>
    <div class="stat"><div class="v" style="color:var(--gr)">${dV.filter(v=>v.estado==='Completada').length}</div><div class="l">OK</div></div>
    <div class="stat"><div class="v" style="color:var(--am)">${dV.filter(v=>v.estado==='Pendiente').length}</div><div class="l">Pendiente</div></div>
    <div class="stat"><div class="v" style="color:var(--ax)">${O.filter(o=>o.fecha===parteDate).length}</div><div class="l">Opps</div></div>
  </div>
  <div class="p2">
    <div>
      <div class="pcard"><div class="pcard-t">📅 Visitas</div>${tl}</div>
      <div class="pcard" style="margin-top:10px"><div class="pcard-t">✅ Tareas</div>
        ${tareas||'<div style="font-size:12px;color:#9ca3af;font-style:italic">Sin tareas</div>'}
        <div class="tadd"><input id="tInp" placeholder="Nueva tarea..." onkeydown="if(event.key==='Enter')addT()"/><button class="btn btn-ax" onclick="addT()">＋</button></div>
      </div>
    </div>
    <div class="pcard">
      <div class="pcard-t">📝 Resumen</div>
      <div class="pf"><label>Objetivo</label><textarea oninput="saveP('obj',this.value)" placeholder="Objetivo del día...">${p.obj||''}</textarea></div>
      <div class="pf"><label>Logros</label><textarea oninput="saveP('log',this.value)" placeholder="Resultados conseguidos...">${p.log||''}</textarea></div>
      <div class="pf"><label>Dificultades</label><textarea oninput="saveP('dif',this.value)" placeholder="Obstáculos encontrados...">${p.dif||''}</textarea></div>
      <div class="pf"><label>Próximos pasos</label><textarea oninput="saveP('prox',this.value)" placeholder="Acciones para mañana...">${p.prox||''}</textarea></div>
      <div class="pf"><label>Estado de ánimo</label>
        <div class="mood">${[['😞','malo'],['😐','regular'],['🙂','bueno'],['😄','excelente'],['🔥','en racha']].map(([em,v])=>`<button class="${p.mood===v?'on':''}" onclick="saveP('mood','${v}');rParte()">${em}</button>`).join('')}</div>
      </div>
    </div>
  </div>`;
}
function saveP(k,v){getP(parteDate)[k]=v;save();}
function addT(){const inp=document.getElementById('tInp');const t=inp?.value.trim();if(!t)return;getP(parteDate).tareas.push({text:t,done:false});save();rParte();}
function toggleT(i){const p=getP(parteDate);p.tareas[i].done=!p.tareas[i].done;save();rParte();}
function delT(i){const p=getP(parteDate);p.tareas.splice(i,1);save();rParte();}

  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-size:16px;font-weight:700">Alertas <span style="font-size:13px;color:#6b7280;font-weight:400">${AL.filter(a=>a.activa).length} activas</span></div>
    <button class="add" onclick="openA(null)">＋ Alerta</button>
  </div>`;
  if(!AL.length){h+=`<div class="empty"><div>🔔</div><p>Sin alertas</p></div>`;}
  else [...AL.filter(a=>a.activa),...AL.filter(a=>!a.activa)].forEach(a=>{
    h+=`<div class="al ${a.activa?'':'done'}">
      <div class="aldot" style="background:${cols[a.tipo]||'#6b7280'}"></div>
      <div class="al-info">
        <div class="al-msg">${icos[a.tipo]||'⭐'} ${a.msg}</div>
        <div class="al-sub">${a.cliente?'👤 '+a.cliente+' · ':''}📅 ${fmtD(a.fecha)}${a.hora?' · '+a.hora:''}</div>

        <button class="btn ${a.activa?'btn-ax':''}" onclick="toggleA('${a.id}')">${a.activa?'✓':'↩'}</button>
        <button class="btn btn-re" onclick="delA('${a.id}')">🗑</button>
      </div>
    </div>`;
  });
  document.getElementById('alertas').innerHTML=h;
}
function toggleA(id){AL=AL.map(a=>a.id===id?{...a,activa:!a.activa}:a);save();rAlertas();}
function delA(id){if(!confirm('¿Eliminar?'))return;AL=AL.filter(a=>a.id!==id);save();rAlertas();}

// ── MODALES ──
function showM(title,body,onOk,onDel){
  document.getElementById('__m')?.remove();
  document.body.insertAdjacentHTML('beforeend',`<div class="ov" id="__m" onclick="if(event.target.id==='__m')closeM()">
    <div class="modal">
      <div class="mh"><h3>${title}</h3><div class="mx" onclick="closeM()">✕</div></div>
      <div class="mb">${body}</div>
      <div class="mf">
        ${onDel?`<button class="btn btn-re" onclick="(${onDel.toString()})()" style="margin-right:auto">🗑️ Eliminar</button>`:''}
        <button class="btn" onclick="closeM()">Cancelar</button>
        ${onOk?`<button class="btn btn-ax" onclick="(${onOk.toString()})()">Guardar</button>`:''}
      </div>
    </div>
  </div>`);
}

// ── EXPORT / IMPORT ──
function exportCSV(){
  const h='Empresa,NIF/CIF,Contacto,Cargo,Teléfono,Email,Sector,Ciudad,Estado,CUPS,Dirección,Compañía,Energía,Tarifa,kW,kWh,Importe €,Origen,Notas';
  const r=C.map(c=>[c.empresa,c.nif||'',c.contacto||'',c.cargo||'',c.telefono||'',c.email||'',c.sector||'',c.ciudad||'',c.estado,c.cups||'',c.direccion||'',c.compania||'',c.energia||'',c.tarifa||'',c.kw||0,c.kwh||0,c.importe||0,c.origen||'',c.notas||''].map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+h+'\n'+r],{type:'text/csv;charset=utf-8;'}));a.download='clientes_'+TODAY+'.csv';a.click();
  toast('📊 CSV exportado');
}
function doImport(e){
  const f=e.target.files[0];if(!f)return;
  new FileReader().onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.V)V=d.V;if(d.C)C=d.C;if(d.O)O=d.O;if(d.AL)AL=d.AL;if(d.PA)PA=d.PA;
      save();render();toast('✅ Datos importados');
    }catch(err){toast('❌ Error: '+err.message);}
  };
  const fr=new FileReader();fr.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.V)V=d.V;if(d.C)C=d.C;if(d.O)O=d.O;if(d.AL)AL=d.AL;if(d.PA)PA=d.PA;save();render();toast('✅ Importado');}catch(err){toast('❌ '+err.message);}};
  fr.readAsText(f);e.target.value='';
}

// ── UTILS ──
const fmtD=iso=>{if(!iso)return'';const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;};
const fmtE=n=>`€${Number(n||0).toLocaleString('es-ES')}`;
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const g=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2600);}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
